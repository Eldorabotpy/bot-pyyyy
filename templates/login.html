<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo de Eldora - Portal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            
            /* O SEU LINK DE FUNDO MANTIDO */
            background-image: url('https://github.com/user-attachments/assets/ea06a84b-c8fc-45d7-977f-c5a55f808815'); 
            
            background-size: cover; background-position: center;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box {
            background: rgba(15, 23, 42, 0.92); 
            border: 2px solid #f39c12; border-radius: 12px;
            
            /* Diminuindo o padding (espaço em branco) geral da caixa e a largura */
            padding: 20px 15px 15px 15px; 
            width: 80%; max-width: 300px; text-align: center;
            
            box-shadow: 0 0 25px rgba(243, 156, 18, 0.4); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center;
        }

        /* EFEITO DA LOGO: Menor e mais ajustada */
        .logo-eldora {
            width: 90px; height: 90px;
            margin-top: -60px; 
            border-radius: 50%;
            border: 3px solid #f39c12;
            box-shadow: 0 0 15px #f39c12, inset 0 0 10px #000;
            background: #000;
            margin-bottom: 10px;
            object-fit: cover;
        }

        /* Título um pouco mais compacto */
        h2 { color: #f39c12; margin: 0 0 15px 0; font-size: 1.1em; letter-spacing: 2px; text-transform: uppercase; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        
        /* O SEGREDO MÁGICO: Limitando a altura e ativando a barra de rolagem! */
        #area-personagens { 
            width: 100%; display: flex; flex-direction: column; gap: 8px; 
            max-height: 220px; overflow-y: auto; padding-right: 5px; 
        }

        /* Estilizando a barrinha de rolagem pra não ficar aquela padrão feia do Windows/Android */
        #area-personagens::-webkit-scrollbar { width: 4px; }
        #area-personagens::-webkit-scrollbar-track { background: transparent; }
        #area-personagens::-webkit-scrollbar-thumb { background: #f39c12; border-radius: 4px; }

        /* Botões mais finos e curtos */
        .btn-char {
            width: 100%; padding: 8px 12px;
            background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #3b82f6; border-left: 4px solid #3b82f6; 
            color: white; border-radius: 6px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; 
            transition: 0.2s; box-sizing: border-box; flex-shrink: 0;
        }
        .btn-char:active { transform: scale(0.96); border-color: #f39c12; }
        .btn-char-info { text-align: left; display: flex; flex-direction: column; }
        .btn-char strong { color: #f39c12; font-size: 0.9em; margin-bottom: 2px; }
        .btn-char span { font-size: 0.7em; color: #94a3b8; text-transform: capitalize; }

        .btn-new {
            width: 100%; padding: 10px; margin-top: 5px;
            background: linear-gradient(180deg, #27ae60 0%, #1e8449 100%);
            border: 1px solid #2ecc71; color: white; font-weight: bold; font-size: 0.85em;
            border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="login-box">
        
        <img src="https://github.com/user-attachments/assets/0f2990de-2b0f-4d3d-90ae-060713ef5abb" class="logo-eldora" alt="Logo Eldora">
        
        <h2>Portal de Acesso</h2>
        <div id="area-personagens">
            <div style="color: #aaa; font-size: 0.9em;">Invocando registros mágicos... ⏳</div>
        </div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        async function buscarPersonagens() {
            const area = document.getElementById('area-personagens');
            let tgUser = window.Telegram.WebApp.initDataUnsafe.user;
            
            if (!tgUser) {
                area.innerHTML = '<p style="color: #e74c3c; font-size: 0.9em;">Erro: Abra o jogo por dentro do Telegram!</p>';
                return;
            }

            try {
                const resposta = await fetch(`/api/meus_personagens/${tgUser.id}`);
                
                // 🛡️ TRAVA DE SEGURANÇA (O DEDO-DURO)
                if (!resposta.ok) {
                    throw new Error(`O servidor retornou Erro ${resposta.status}`);
                }

                const personagens = await resposta.json();

                let htmlBotoes = '';

                if (personagens.length > 0) {
                    personagens.forEach(p => {
                        let classeNome = p.classe;
                        if (!classeNome || classeNome === 'None' || classeNome === 'null') {
                            classeNome = 'Aventureiro';
                        }
                        
                        htmlBotoes += `
                        <button class="btn-char" onclick="entrarNoJogo('${p.id}', '${p.nome}')">
                            <div class="btn-char-info">
                                <strong>${p.nome}</strong>
                                <span>${classeNome.replace(/_/g, ' ')} - Nv. ${p.level}</span>
                            </div>
                            <span style="font-size: 1.2em;">⚔️</span>
                        </button>`;
                    });
                } else {
                    htmlBotoes += '<p style="color: #aaa; font-size: 0.85em; margin-bottom: 15px;">Nenhum herói encontrado nesta conta.</p>';
                }

                htmlBotoes += `<button class="btn-new" onclick="alert('A criação de novos personagens estará disponível na próxima atualização!')">➕ Criar Personagem</button>`;
                area.innerHTML = htmlBotoes;

            } catch (erro) {
                // 🚨 MOSTRA O ERRO EXATO NA TELA
                area.innerHTML = `<p style="color: #e74c3c; font-size: 0.9em; font-weight: bold;">Erro Real: ${erro.message}<br><span style="font-size:0.8em; color:#aaa;">Verifique o terminal do Python!</span></p>`;
            }
        }

        function entrarNoJogo(objectId, nome) {
            localStorage.setItem("jogadorEldoraID", objectId);
            localStorage.setItem("jogadorEldoraNome", nome);
            window.location.href = "/"; 
        }

        buscarPersonagens();
    </script>
</body>
</html>
